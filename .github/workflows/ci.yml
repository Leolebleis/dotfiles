name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  chezmoi-dry-run:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        shell: bash
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/bin"

      - name: Dry-run apply
        shell: bash
        run: |
          ~/bin/chezmoi init --source "$GITHUB_WORKSPACE" --force
          ~/bin/chezmoi apply --dry-run --verbose --force

  validate-powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse PowerShell profile
        shell: pwsh
        run: |
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/Documents/PowerShell/Microsoft.PowerShell_profile.ps1",
            [ref]$null,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }
          Write-Host "PowerShell profile parsed OK"

  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/bin"

      - name: Validate WT settings JSON
        run: |
          python3 -m json.tool \
            "AppData/Local/Packages/Microsoft.WindowsTerminal_8wekyb3d8bbwe/LocalState/settings.json" \
            > /dev/null
          echo "WT settings.json is valid JSON"
